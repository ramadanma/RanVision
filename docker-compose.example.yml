version: "3.9"

# ═══════════════════════════════════════════════════════
# 使用说明：
#   1. 复制为 docker-compose.yml（该文件不入 git）
#      cp docker-compose.example.yml docker-compose.yml
#   2. 根据服务器实际端口占用情况修改宿主机端口（冒号左侧）
#   3. 容器间通信始终使用服务名（mysql:3306 / redis:6379），
#      宿主机端口仅供外部工具访问（如 DBeaver 连 MySQL）
#
# 默认端口（已规避与 CVAT / Nuclio / Ollama 等已有容器冲突）：
#   MySQL  : 宿主机 3307 → 容器 3306  （3306 已被 mysql-server 占用）
#   Redis  : 宿主机 6381 → 容器 6379  （6380 已被 redis-server 占用）
#   Backend: 宿主机 8000 → 容器 8000  （空闲）
# ═══════════════════════════════════════════════════════

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"   # ← 如有冲突改左侧端口号
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6381:6379"   # ← 如有冲突改左侧端口号
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 容器间通信使用服务名，不受宿主机端口影响
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      HLS_SEGMENTS_DIR: /app/hls_segments
      UPLOADS_DIR: /app/uploads
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - ./backend/hls_segments:/app/hls_segments
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"   # ← 如有冲突改左侧端口号
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mysql_data:
  redis_data:
